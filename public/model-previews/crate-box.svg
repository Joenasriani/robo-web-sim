<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Crate box — isometric 3-face view, warm brown wood tones -->
  <!-- Left face -->
  <polygon points="8,22 28,12 28,48 8,58" fill="#7c5c2e" stroke="#5a3e18" stroke-width="1"/>
  <!-- Right face -->
  <polygon points="28,12 52,22 52,58 28,48" fill="#9a7040" stroke="#5a3e18" stroke-width="1"/>
  <!-- Top face -->
  <polygon points="8,22 28,12 52,22 32,32" fill="#c29050" stroke="#5a3e18" stroke-width="1"/>
  <!-- Wood grain lines on left face -->
  <line x1="8" y1="30" x2="28" y2="20" stroke="#5a3e18" stroke-width="0.8" opacity="0.5"/>
  <line x1="8" y1="42" x2="28" y2="32" stroke="#5a3e18" stroke-width="0.8" opacity="0.5"/>
  <!-- Wood grain lines on right face -->
  <line x1="28" y1="20" x2="52" y2="30" stroke="#5a3e18" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="32" x2="52" y2="42" stroke="#5a3e18" stroke-width="0.8" opacity="0.5"/>
  <!-- Metal strap H-lines on left -->
  <line x1="8" y1="22" x2="28" y2="12" stroke="#d4b060" stroke-width="1.5" opacity="0.9"/>
  <line x1="8" y1="58" x2="28" y2="48" stroke="#d4b060" stroke-width="1.5" opacity="0.9"/>
  <!-- Metal strap H-lines on right -->
  <line x1="28" y1="12" x2="52" y2="22" stroke="#d4b060" stroke-width="1.5" opacity="0.9"/>
  <line x1="28" y1="48" x2="52" y2="58" stroke="#d4b060" stroke-width="1.5" opacity="0.9"/>
</svg>
