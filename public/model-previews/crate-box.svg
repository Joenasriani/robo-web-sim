<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Crate box preview -->
  <rect x="12" y="20" width="40" height="36" rx="2" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <!-- Top face (isometric) -->
  <polygon points="12,20 32,10 52,20 32,30" fill="#f87171" stroke="#b91c1c" stroke-width="1.5"/>
  <!-- Right face shading -->
  <polygon points="52,20 52,56 32,56 32,30" fill="#dc2626" stroke="#b91c1c" stroke-width="1.5"/>
  <!-- Cross lines on front -->
  <line x1="12" y1="20" x2="52" y2="20" stroke="#b91c1c" stroke-width="1"/>
  <line x1="32" y1="20" x2="32" y2="56" stroke="#b91c1c" stroke-width="1"/>
  <line x1="12" y1="38" x2="52" y2="38" stroke="#b91c1c" stroke-width="1"/>
</svg>
