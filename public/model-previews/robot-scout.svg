<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Robot Scout — simple front-view robot silhouette, slate-grey metal -->
  <!-- Shadow -->
  <ellipse cx="32" cy="60" rx="16" ry="3" fill="#0f172a" opacity="0.3"/>
  <!-- Wheels -->
  <ellipse cx="20" cy="50" rx="7" ry="5" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <ellipse cx="44" cy="50" rx="7" ry="5" fill="#334155" stroke="#1e293b" stroke-width="1"/>
  <!-- Base/caster -->
  <rect x="22" y="47" width="20" height="5" rx="2" fill="#475569" stroke="#334155" stroke-width="1"/>
  <!-- Torso -->
  <rect x="18" y="28" width="28" height="22" rx="3" fill="#64748b" stroke="#475569" stroke-width="1.5"/>
  <!-- Torso panel lines -->
  <line x1="18" y1="38" x2="46" y2="38" stroke="#475569" stroke-width="1" opacity="0.6"/>
  <rect x="24" y="32" width="6" height="4" rx="1" fill="#3b82f6" opacity="0.7"/>
  <!-- Arms -->
  <rect x="8"  y="29" width="9" height="16" rx="2" fill="#64748b" stroke="#475569" stroke-width="1"/>
  <rect x="47" y="29" width="9" height="16" rx="2" fill="#64748b" stroke="#475569" stroke-width="1"/>
  <!-- Neck -->
  <rect x="27" y="24" width="10" height="5" rx="1" fill="#475569" stroke="#334155" stroke-width="1"/>
  <!-- Head -->
  <rect x="17" y="10" width="30" height="16" rx="4" fill="#78909c" stroke="#546e7a" stroke-width="1.5"/>
  <!-- Eyes -->
  <rect x="22" y="15" width="7" height="5" rx="1" fill="#38bdf8" opacity="0.9"/>
  <rect x="35" y="15" width="7" height="5" rx="1" fill="#38bdf8" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="32" y1="10" x2="32" y2="5" stroke="#94a3b8" stroke-width="1.5"/>
  <circle cx="32" cy="4" r="2" fill="#f59e0b"/>
</svg>
